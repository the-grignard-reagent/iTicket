spring:
  application:
    name: "iticket-backend"
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${MYSQLUSER}
    password: ${MYSQLPASSWORD}

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
  #      database-platform: org.hibernate.dialect.MySQL8Dialect
  ai:
    openai:
      api-key: ${OPENAI_API_KEY}
      chat:
        options:
          model: gpt-4o-mini
          temperature: 0.3

    chat:
      memory:
        repository:
          jdbc:
            initialize-schema: always

server:
  port: ${PORT_NO}


  #database configurations

logging:
  level:
    org:
      springframework:
        ai:
          chat:
           client:
             advisor: DEBUG