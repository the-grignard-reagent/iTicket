spring:
  application:
    name: "iticket"

  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  ai:
    openai:
      api-key: ${OPENAI_API_KEY}
      chat:
        options:
          model: gpt-4o-mini
          temperature: 0.3

    chat:
      memory:
        repository:
          jdbc:
            initialize-schema: always

server:
  port: ${PORT}

logging:
  level:
    org:
      springframework:
        ai:
          chat:
            client:
              advisor: DEBUG